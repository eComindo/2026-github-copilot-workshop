<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR Create Page - Sample</title>
  <link rel="stylesheet" href="./pr-create.css" />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Purchase Requisition - Create</h1>
      <p>Create a PR with header information and line items.</p>
    </header>

    <form class="pr-form" action="#" method="post">
      <section class="card">
        <h2>PR Header</h2>
        <div class="grid-2">
          <label>
            Requester Name
            <input type="text" name="requesterName" placeholder="e.g. Budi Santoso" required />
          </label>

          <label>
            Department
            <input type="text" name="department" placeholder="e.g. Maintenance" required />
          </label>

          <label>
            PR Title
            <input type="text" name="title" placeholder="e.g. Maintenance materials Q2" required />
          </label>

          <label>
            Needed By Date
            <input type="date" name="neededByDate" required />
          </label>

          <label class="full-width">
            Notes
            <textarea name="notes" rows="3" placeholder="Optional notes"></textarea>
          </label>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>PR Lines</h2>
          <button type="button">+ Add Line</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Line</th>
                <th>Item Code</th>
                <th>Item Name</th>
                <th>Qty</th>
                <th>UOM</th>
                <th>Est. Unit Price</th>
                <th>Site</th>
                <th>Required Date</th>
                <th>Budget Center</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td><input type="text" name="line1_itemCode" placeholder="ITEM-001" required /></td>
                <td><input type="text" name="line1_itemName" placeholder="Item name" required /></td>
                <td><input type="number" name="line1_qty" min="0.01" step="0.01" placeholder="0" required /></td>
                <td><input type="text" name="line1_uom" placeholder="PCS" required /></td>
                <td><input type="number" name="line1_price" min="0" step="0.01" placeholder="0" required /></td>
                <td><input type="text" name="line1_site" placeholder="SITE-A" required /></td>
                <td><input type="date" name="line1_requiredDate" required /></td>
                <td><input type="text" name="line1_budgetCenter" placeholder="BC-001" required /></td>
                <td><button type="button" class="danger">Remove</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <footer class="form-actions">
        <button type="button">Save as Draft</button>
        <button type="submit">Submit PR</button>
      </footer>
    </form>
  </main>
</body>
</html>
