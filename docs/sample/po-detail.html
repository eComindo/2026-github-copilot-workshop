<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PO Detail Page - Sample</title>
  <link rel="stylesheet" href="./detail-page.css" />
</head>
<body>
  <main class="container">
    <a class="back-link" href="./po-list.html">← Back to PO List</a>
    <header class="page-header">
      <h1>Purchase Order Detail</h1>
      <p>PO-0010</p>
    </header>

    <section class="card grid-3">
      <div><p class="label">Status</p><p class="value">SUBMITTED</p></div>
      <div><p class="label">Vendor</p><p class="value">PT Maju Bersama</p></div>
      <div><p class="label">PO Date</p><p class="value">2026-02-24</p></div>
    </section>

    <section class="card">
      <h2>PO Lines</h2>
      <table>
        <thead>
          <tr><th>Line</th><th>Item</th><th>Order Qty</th><th>Received Qty</th><th>Open Qty</th></tr>
        </thead>
        <tbody>
          <tr><td>1</td><td>Bearing 6205</td><td>10</td><td>4</td><td>6</td></tr>
          <tr><td>2</td><td>Safety Gloves</td><td>20</td><td>0</td><td>20</td></tr>
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
